<!DOCTYPE html>
<html>
<head>
    <title>Akshaya Digital Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            background: #f1f5f9;
            font-family: Arial, sans-serif;
        }

        .sidebar{
            min-height: 100vh;
            background: linear-gradient(180deg, #0b132b, #0f172a);
            color: white;
            padding: 28px 18px;
            box-shadow: 4px 0 18px rgba(0,0,0,0.08);
        }

        .sidebar h3{
            font-weight: 700;
            margin-bottom: 35px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .sidebar a{
            display: flex;
            align-items: center;
            gap: 12px;
            color: #dbeafe;
            text-decoration: none;
            padding: 13px 14px;
            margin-bottom: 10px;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 17px;
        }

        .sidebar a:hover{
            background: rgba(37, 99, 235, 0.22);
            color: #ffffff;
            transform: translateX(4px);
        }

        .sidebar a i{
            font-size: 18px;
            width: 20px;
        }

        .content-area{
            padding: 22px;
        }

        .topbar{
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            padding: 18px 28px;
            box-shadow: 0 10px 30px rgba(15,23,42,0.08);
            margin-bottom: 28px;
            border: 1px solid #e2e8f0;
        }

        .topbar h4{
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }

        .topbar span{
            color: #64748b;
            font-size: 18px;
        }

        .page-title{
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 24px;
        }

        .dashboard-card{
            border: none;
            border-radius: 20px;
            background: linear-gradient(180deg, #ffffff, #f8fafc);
            box-shadow: 0 12px 30px rgba(15,23,42,0.08);
            padding: 28px 22px;
            text-align: center;
            transition: all 0.3s ease;
            height: 100%;
        }

        .dashboard-card:hover{
            transform: translateY(-4px);
            box-shadow: 0 18px 35px rgba(15,23,42,0.12);
        }

        .dashboard-card .icon-box{
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 24px;
            color: white;
        }

        .icon-blue{ background: linear-gradient(135deg, #2563eb, #3b82f6); }
        .icon-green{ background: linear-gradient(135deg, #16a34a, #22c55e); }
        .icon-orange{ background: linear-gradient(135deg, #ea580c, #f97316); }
        .icon-purple{ background: linear-gradient(135deg, #7c3aed, #a855f7); }

        .dashboard-card h5{
            color: #64748b;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .dashboard-card h3{
            font-weight: 800;
            color: #0f172a;
            margin: 0;
            font-size: 34px;
        }

        .chart-card{
            background: #ffffff;
            border-radius: 22px;
            box-shadow: 0 12px 30px rgba(15,23,42,0.08);
            padding: 28px;
            margin-top: 26px;
            border: 1px solid #e2e8f0;
        }

        .chart-card h4{
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 18px;
        }

        .stat-subtext{
            color: #94a3b8;
            font-size: 14px;
            margin-top: 6px;
        }

        .custom-table{
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 24px rgba(15,23,42,0.08);
            border: 1px solid #e2e8f0;
        }

        .btn-custom{
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 600;
        }

        @media (max-width: 768px){
            .sidebar{
                min-height: auto;
                border-radius: 0 0 18px 18px;
            }

            .topbar{
                padding: 16px 18px;
            }

            .dashboard-card h3{
                font-size: 28px;
            }
        }

        

    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <div class="col-lg-2 col-md-3 sidebar">
            <h3>Akshaya</h3>

            <a href="/dashboard/"><i class="bi bi-speedometer2"></i>Dashboard</a>
            <a href="/customers/"><i class="bi bi-people"></i>Customers</a>
            <a href="/services/"><i class="bi bi-grid"></i>Services</a>
            <a href="/bills/"><i class="bi bi-receipt"></i>Bills</a>
            <a href="/daily-report/"><i class="bi bi-calendar-day"></i>Daily Report</a>
            <a href="/monthly-report/"><i class="bi bi-bar-chart-line"></i>Monthly Report</a>
            <a href="/logout/"><i class="bi bi-box-arrow-right"></i>Logout</a>
        </div>

        <div class="col-lg-10 col-md-9 content-area">
            <div class="topbar d-flex justify-content-between align-items-center">
                <h4>Akshaya Digital Center</h4>
                <span>Management System</span>
            </div>

            {% block content %}
            {% endblock %}
        </div>

    </div>
</div>

</body>
</html>
