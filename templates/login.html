<!DOCTYPE html>
<html>
<head>
    <title>Login - Akshaya Digital Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .login-card{
            width: 100%;
            max-width: 420px;
            background: white;
            border: none;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            padding: 35px 30px;
        }

        .brand-title{
            font-size: 30px;
            font-weight: 700;
            color: #0f172a;
            text-align: center;
            margin-bottom: 8px;
        }

        .brand-subtitle{
            text-align: center;
            color: #64748b;
            margin-bottom: 28px;
        }

        .form-control{
            border-radius: 10px;
            padding: 12px;
        }

        .btn-login{
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
        }

        .btn-login:hover{
            background: #1d4ed8;
            color: white;
        }

        label{
            font-weight: 600;
            margin-bottom: 6px;
        }

        .footer-text{
            text-align: center;
            color: #94a3b8;
            margin-top: 18px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-title">Akshaya</div>
        <div class="brand-subtitle">Digital Center Management System</div>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="id_username">Username</label>
                <input type="text" name="username" class="form-control" id="id_username" required>
            </div>

            <div class="mb-3">
                <label for="id_password">Password</label>
                <input type="password" name="password" class="form-control" id="id_password" required>
            </div>

            <button type="submit" class="btn btn-login">Login</button>
        </form>

        {% if form.errors %}
            <div class="alert alert-danger mt-3 mb-0">
                Invalid username or password.
            </div>
        {% endif %}

        <div class="footer-text">
            Secure access for authorized staff
        </div>
    </div>

</body>
</html>
