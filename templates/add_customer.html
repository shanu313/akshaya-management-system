{% extends 'base.html' %}

{% block content %}

<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
    <div>
        <h2 class="page-title mb-1">Add Customer</h2>
        <p class="text-muted mb-0">Create a new customer record</p>
    </div>

    <a href="/customers/" class="btn btn-secondary btn-custom">
        <i class="bi bi-arrow-left me-2"></i>Back to Customers
    </a>
</div>

<div class="custom-table p-4">
    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-semibold">Customer Name</label>
            {{ form.name }}
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Phone</label>
            {{ form.phone }}
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Address</label>
            {{ form.address }}
        </div>

        <button type="submit" class="btn btn-primary btn-custom">
            <i class="bi bi-save me-2"></i>Save Customer
        </button>
    </form>
</div>

{% endblock %}
