{% extends 'base.html' %}

{% block content %}

<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
    <div>
        <h2 class="page-title mb-1">Create Bill</h2>
        <p class="text-muted mb-0">Select customer to start billing</p>
    </div>

    <a href="/bills/" class="btn btn-secondary btn-custom">
        <i class="bi bi-arrow-left me-2"></i>Back to Bills
    </a>
</div>

<div class="custom-table p-4">
    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-semibold">Customer</label>
            {{ form.customer }}
        </div>

        <button type="submit" class="btn btn-success btn-custom">
            <i class="bi bi-arrow-right-circle me-2"></i>Next
        </button>
    </form>
</div>

{% endblock %}
