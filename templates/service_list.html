{% extends 'base.html' %}

{% block content %}

<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
    <div>
        <h2 class="page-title mb-1">Service List</h2>
        <p class="text-muted mb-0">Manage available services and pricing</p>
    </div>

    <a href="/add-service/" class="btn btn-success btn-custom">
        <i class="bi bi-plus-circle me-2"></i>Add New Service
    </a>
</div>

<div class="custom-table p-3">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Service Name</th>
                    <th>Price</th>
                    <th style="min-width:160px;">Actions</th>
                </tr>
            </thead>

            <tbody>
                {% for service in services %}
                <tr>
                    <td class="fw-semibold">{{ service.service_name }}</td>
                    <td class="fw-semibold text-success">₹ {{ service.price }}</td>
                    <td>

                        <a href="/edit-service/{{ service.id }}/" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil-square"></i>
                        </a>

                        <a href="/delete-service/{{ service.id }}/"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure?')">
                           <i class="bi bi-trash"></i>
                        </a>

                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center py-4 text-muted">
                        No services available
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>
</div>

{% endblock %}
