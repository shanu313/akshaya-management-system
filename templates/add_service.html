{% extends 'base.html' %}

{% block content %}

<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
    <div>
        <h2 class="page-title mb-1">Add Service</h2>
        <p class="text-muted mb-0">Create a new service and set its price</p>
    </div>

    <a href="/services/" class="btn btn-secondary btn-custom">
        <i class="bi bi-arrow-left me-2"></i>Back to Services
    </a>
</div>

<div class="custom-table p-4">
    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-semibold">Service Name</label>
            {{ form.service_name }}
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Price</label>
            {{ form.price }}
        </div>

        <button type="submit" class="btn btn-success btn-custom">
            <i class="bi bi-save me-2"></i>Save Service
        </button>
    </form>
</div>

{% endblock %}
